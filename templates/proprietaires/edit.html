{% extends "base.html" %}
{% block title %}Modifier {{ prop.nom }}{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px">
  <div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('proprietaires') }}" class="btn btn-outline-secondary btn-sm me-3">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h2 class="mb-0"><i class="fas fa-user-edit text-primary me-2"></i>Modifier {{ prop.nom }}</h2>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form method="POST">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Nom <span class="text-danger">*</span></label>
            <input type="text" name="nom" class="form-control" value="{{ prop.nom }}" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Prénom</label>
            <input type="text" name="prenom" class="form-control" value="{{ prop.prenom or '' }}">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Téléphone</label>
            <input type="tel" name="telephone" class="form-control" value="{{ prop.telephone or '' }}">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ prop.email or '' }}">
          </div>
          <div class="col-12 mb-3">
            <label class="form-label fw-bold">Adresse</label>
            <textarea name="adresse" class="form-control" rows="2">{{ prop.adresse or '' }}</textarea>
          </div>
          <div class="col-12 mb-4">
            <label class="form-label fw-bold">Notes</label>
            <textarea name="notes" class="form-control" rows="2">{{ prop.notes or '' }}</textarea>
          </div>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Enregistrer</button>
          <a href="{{ url_for('proprietaires') }}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
