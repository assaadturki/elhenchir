{% extends "base.html" %}
{% block content %}
<h2>Ajouter Produit</h2>
<div class="row"><div class="col-md-6">
    <form method="POST">
        <div class="mb-3"><label>Produit</label><input type="text" name="produit" class="form-control" required></div>
        <div class="mb-3"><label>Categorie</label><select name="categorie" class="form-control">{% for cat in categories %}<option value="{{ cat }}">{{ cat }}</option>{% endfor %}</select></div>
        <div class="mb-3"><label>Quantite</label><input type="number" step="0.01" name="quantite" class="form-control" required></div>
        <div class="mb-3"><label>Unite</label><select name="unite" class="form-control"><option value="kg">kg</option><option value="L">L</option><option value="pieces">pieces</option></select></div>
        <div class="mb-3"><label>Seuil alerte</label><input type="number" step="0.01" name="seuil_alerte" class="form-control" value="10"></div>
        <div class="mb-3"><label>Emplacement</label><input type="text" name="emplacement" class="form-control"></div>
        <button type="submit" class="btn btn-success">Ajouter</button>
        <a href="{{ url_for('inventory') }}" class="btn btn-secondary">Annuler</a>
    </form>
</div></div>
{% endblock %}
