{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3">
    <h1 class="h2">🛢️ Ajouter du stock d'huile</h1>
    <div class="btn-toolbar">
        <a href="{{ url_for('stock_huile') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <i class="fas fa-oil-can"></i> Nouveau lot d'huile d'olive
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="campagne" class="form-label">Campagne *</label>
                            <input type="text" class="form-control" id="campagne" name="campagne" placeholder="Ex: 2024/2025" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="variete" class="form-label">Variété</label>
                            <select class="form-control" id="variete" name="variete">
                                <option value="Chemlali">Chemlali</option>
                                <option value="Chetoui">Chetoui</option>
                                <option value="Zarrazi">Zarrazi</option>
                                <option value="Oueslati">Oueslati</option>
                                <option value="Melange">Mélange</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="quantite_litres" class="form-label">Quantité (Litres) *</label>
                            <input type="number" step="0.01" class="form-control" id="quantite_litres" name="quantite_litres" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="qualite" class="form-label">Qualité</label>
                            <select class="form-control" id="qualite" name="qualite">
                                <option value="Extra vierge">Extra vierge</option>
                                <option value="Vierge">Vierge</option>
                                <option value="Lampante">Lampante</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="prix_vente_litre" class="form-label">Prix de vente (TND/Litre)</label>
                            <input type="number" step="0.001" class="form-control" id="prix_vente_litre" name="prix_vente_litre" placeholder="0.000">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="date_stock" class="form-label">Date de stock</label>
                            <input type="date" class="form-control" id="date_stock" name="date_stock" value="{{ now.strftime('%Y-%m-%d') }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3" 
                                  placeholder="Stockage, conditionnement, etc."></textarea>
                    </div>

                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> Ajouter au stock
                    </button>
                    <a href="{{ url_for('stock_huile') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Annuler
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
