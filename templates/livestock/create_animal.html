{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3">
    <h2>Ajouter Animal</h2>
    <a href="{{ url_for('animals') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Retour</a>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <form method="POST">

        <div class="card mb-3">
            <div class="card-header bg-success text-white"><i class="fas fa-paw me-2"></i>Informations animal</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Type *</label>
                        <select name="type_id" class="form-control" required>
                            {% for t in types %}<option value="{{ t.id }}">{{ t.nom }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Numero identification</label>
                        <input type="text" name="numero_identification" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" name="nom" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sexe</label>
                        <select name="sexe" class="form-control">
                            <option value="Male">Male</option>
                            <option value="Femelle">Femelle</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Race</label>
                        <input type="text" name="race" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date naissance</label>
                        <input type="date" name="date_naissance" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Poids naissance (kg)</label>
                        <input type="number" step="0.1" name="poids_naissance" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prix achat (TND)</label>
                        <input type="number" step="0.001" name="prix_achat" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date achat</label>
                        <input type="date" name="date_achat" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Parcelle</label>
                        <select name="parcelle_id" class="form-control">
                            <option value="">Aucune</option>
                            {% for p in plots %}<option value="{{ p.id }}">{{ p.nom }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- PROPRIETAIRES -->
        <div class="card mb-3 border-warning">
            <div class="card-header bg-warning text-dark">
                <i class="fas fa-user-tie me-2"></i>Proprietaires &amp; Parts
                <small class="ms-2">(total doit etre 100%)</small>
            </div>
            <div class="card-body">
                <div id="proprietaires-container">
                    <div class="row proprietaire-row mb-2">
                        <div class="col-md-7">
                            <select name="prop_id[]" class="form-select">
                                <option value="">-- Choisir un proprietaire --</option>
                                {% for p in proprietaires %}
                                <option value="{{ p.id }}">{{ p.nom }} {{ p.prenom or '' }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <div class="input-group">
                                <input type="number" name="prop_part[]" class="form-control part-input"
                                       min="0" max="100" step="0.01" placeholder="Part %"
                                       oninput="updateTotal()">
                                <span class="input-group-text">%</span>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <button type="button" class="btn btn-outline-danger w-100" onclick="removeRow(this)">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <button type="button" class="btn btn-outline-warning btn-sm" onclick="addRow()">
                        <i class="fas fa-plus me-1"></i> Ajouter proprietaire
                    </button>
                    <span class="badge bg-secondary" id="total-badge">Total: 0%</span>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Enregistrer</button>
        <a href="{{ url_for('animals') }}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>

<script>
const proprietairesOptions = `{% for p in proprietaires %}<option value="{{ p.id }}">{{ p.nom }} {{ p.prenom or '' }}</option>{% endfor %}`;
function addRow() {
    const container = document.getElementById('proprietaires-container');
    const row = document.createElement('div');
    row.className = 'row proprietaire-row mb-2';
    row.innerHTML = `
        <div class="col-md-7"><select name="prop_id[]" class="form-select"><option value="">-- Choisir --</option>${proprietairesOptions}</select></div>
        <div class="col-md-3"><div class="input-group"><input type="number" name="prop_part[]" class="form-control part-input" min="0" max="100" step="0.01" placeholder="Part %" oninput="updateTotal()"><span class="input-group-text">%</span></div></div>
        <div class="col-md-2"><button type="button" class="btn btn-outline-danger w-100" onclick="removeRow(this)"><i class="fas fa-times"></i></button></div>`;
    container.appendChild(row);
}
function removeRow(btn) { btn.closest('.proprietaire-row').remove(); updateTotal(); }
function updateTotal() {
    let total = 0;
    document.querySelectorAll('.part-input').forEach(i => { total += parseFloat(i.value) || 0; });
    const badge = document.getElementById('total-badge');
    badge.textContent = `Total: ${total.toFixed(1)}%`;
    badge.className = total > 100 ? 'badge bg-danger' : total === 100 ? 'badge bg-success' : 'badge bg-secondary';
}
</script>
{% endblock %}
