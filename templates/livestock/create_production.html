{% extends "base.html" %}
{% block content %}
<h2>Ajouter Production - {{ animal.nom or animal.numero_identification }}</h2>
<form method="POST"><div class="col-md-6">
    <div class="mb-3"><label>Date</label><input type="date" name="date_production" class="form-control" value="{{ now.strftime('%Y-%m-%d') }}" required></div>
    <div class="mb-3"><label>Produit</label><select name="type_produit" class="form-control">{% for t in types_produit %}<option value="{{ t }}">{{ t }}</option>{% endfor %}</select></div>
    <div class="mb-3"><label>Quantite</label><input type="number" step="0.01" name="quantite" class="form-control" required></div>
    <div class="mb-3"><label>Unite</label><select name="unite" class="form-control">{% for u in unites %}<option value="{{ u }}">{{ u }}</option>{% endfor %}</select></div>
    <div class="mb-3"><label>Prix unitaire (TND)</label><input type="number" step="0.001" name="prix_vente_unitaire" class="form-control"></div>
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{{ url_for('animal_detail', id=animal.id) }}" class="btn btn-secondary">Retour</a>
</div></form>
{% endblock %}
