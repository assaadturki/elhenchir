{% extends "base.html" %}
{% block title %}Ajouter Dépense{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:650px">
  <div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('expenses') }}" class="btn btn-outline-secondary btn-sm me-3"><i class="fas fa-arrow-left"></i></a>
    <h2 class="mb-0"><i class="fas fa-plus text-success me-2"></i>Nouvelle dépense</h2>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <!-- enctype="multipart/form-data" obligatoire pour l'upload -->
      <form method="POST" enctype="multipart/form-data">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Catégorie <span class="text-danger">*</span></label>
            <select name="categorie" class="form-select" required>
              <option value="">-- Choisir --</option>
              {% for c in categories %}<option>{{ c }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Montant (TND) <span class="text-danger">*</span></label>
            <input type="number" name="montant_tnd" class="form-control" step="0.001" min="0" required placeholder="0.000">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Date <span class="text-danger">*</span></label>
            <input type="date" name="date_depense" class="form-control" required value="{{ now.strftime('%Y-%m-%d') }}">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Parcelle</label>
            <select name="parcelle_id" class="form-select">
              <option value="">-- Aucune --</option>
              {% for p in plots %}<option value="{{ p.id }}">{{ p.nom }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Fournisseur</label>
            <input type="text" name="fournisseur" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">N° Référence / Facture</label>
            <input type="text" name="reference" class="form-control" placeholder="FAC-2024-001">
          </div>
          <div class="col-12 mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea name="description" class="form-control" rows="2"></textarea>
          </div>

          <!-- UPLOAD FACTURE -->
          <div class="col-12 mb-4">
            <label class="form-label fw-bold"><i class="fas fa-paperclip me-1"></i>Facture (PDF ou image)</label>
            <div class="upload-zone border rounded p-3 text-center" id="uploadZone"
                 onclick="document.getElementById('facture').click()"
                 style="cursor:pointer; border-style:dashed !important; background:#f8f9fa;">
              <i class="fas fa-cloud-upload-alt fa-2x text-muted mb-2 d-block"></i>
              <p class="mb-1 text-muted">Cliquer pour choisir un fichier</p>
              <small class="text-muted">PDF, JPG, PNG — max 16MB</small>
              <p class="mt-2 mb-0 fw-bold text-success d-none" id="fileName"></p>
            </div>
            <input type="file" name="facture" id="facture" class="d-none"
                   accept=".pdf,.jpg,.jpeg,.png" onchange="showFileName(this)">
          </div>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Enregistrer</button>
          <a href="{{ url_for('expenses') }}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function showFileName(input) {
  const label = document.getElementById('fileName');
  const zone = document.getElementById('uploadZone');
  if (input.files && input.files[0]) {
    label.textContent = '✓ ' + input.files[0].name;
    label.classList.remove('d-none');
    zone.style.borderColor = '#2E7D32';
    zone.style.background = '#f0fff0';
  }
}
</script>
{% endblock %}
