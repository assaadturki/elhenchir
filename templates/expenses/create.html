{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3">
    <h2>Ajouter une depense</h2>
    <a href="{{ url_for('expenses') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Retour</a>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <form method="POST" enctype="multipart/form-data">

        <div class="card mb-3">
            <div class="card-header bg-danger text-white"><i class="fas fa-receipt me-2"></i>Depense</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Categorie *</label>
                    <select name="categorie" class="form-control" required>
                        {% for cat in categories %}<option value="{{ cat }}">{{ cat }}</option>{% endfor %}
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Montant (TND) *</label>
                        <input type="number" step="0.001" name="montant_tnd" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date *</label>
                        <input type="date" name="date_depense" class="form-control" value="{{ now.strftime('%Y-%m-%d') }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Parcelle</label>
                        <select name="parcelle_id" class="form-control">
                            <option value="">Aucune</option>
                            {% for plot in plots %}<option value="{{ plot.id }}">{{ plot.nom }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fournisseur</label>
                        <input type="text" name="fournisseur" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-paperclip me-1"></i>Facture (PDF/image)</label>
                    <input type="file" name="facture" class="form-control" accept=".pdf,.jpg,.png,.jpeg">
                </div>
            </div>
        </div>

        <!-- PROPRIETAIRE PAYEUR -->
        <div class="card mb-3 border-warning">
            <div class="card-header bg-warning text-dark">
                <i class="fas fa-user-tie me-2"></i>Payeur (optionnel)
                <small class="ms-2">— Laisser vide = budget commun</small>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Proprietaire payeur</label>
                        <select name="proprietaire_id" class="form-select">
                            <option value="">Budget commun</option>
                            {% for p in proprietaires %}
                            <option value="{{ p.id }}">{{ p.nom }} {{ p.prenom or '' }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Type</label>
                        <select name="type_depense_prop" class="form-select">
                            <option value="personnelle">Depense personnelle</option>
                            <option value="part_commune">Part du budget commun</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-danger"><i class="fas fa-save me-1"></i>Enregistrer</button>
        <a href="{{ url_for('expenses') }}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
